<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Sign Up Page</title>
</head>
<body>
    <div class="card">
        <h1>Sign Up Page</h1>
        <form action="#" method="post">
            <label for="fname">First Name: </label>
            <input type="text" id="fname" name="fname"><br>

            <label for="lname">Last Name: </label>
            <input type="text" id="lname" name="lname"><br>

            <label for="age">Age : </label>
            <input type="number" name="age" id="age"><br>

            <label for="Phn">Phone number: </label>
            <input type="tel" name="Phn" id="Phn"><br>

            <label for="email">Email id: </label>
            <input type="email" id="email" name="email"><br>

            <label for="pass">Password: </label>
            <input type="password" name="pass" id="pass"><br>
            <label for="pass2">Confirm Password: </label>
            <input type="password" name="pass2" id="pass2"><br>

            <input type="submit">
        </form>

        <div class="social-button">
            <button type="button"><img src="/Sign-Up Form/img/image.png" alt="Sign up with Google" style="width: 35px; height: auto; border-radius: 60px; cursor: pointer;"></button>
            <button type="button"><img src="/Sign-Up Form/img/image copy.png" alt="Sign up with Email" style="width:35px; height: auto; cursor: pointer;"></button>
        </div>
    </div>
</body>
</html>
