<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/Expence Tracker/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <title>Expence tracker</title>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="head_info">
                <h2><i class="fa-solid fa-wallet"></i>Expense Tracker</h2>
                <h5>Tacke control of your finances</h5>
            </div>
        </div>
        <div class="dashboard">
            <div class="info">
                <div class="balance-card">
                    <div class="card-title">
                        <i class="fa-solid fa-scale-balanced"></i> <span>Current Balance</span>
                    </div>
                    <h1 id="balance">₹0.00</h1>
                </div>
                <div class="gr">
                    <div class="green-card">
                        <div class="card-title">
                            <i class="fa-solid fa-circle-arrow-up"></i> <span>Income</span>
                        </div>
                        <p id="money-plus" class="money plus">+₹0.00</p>
                    </div>
                    <div class="red-card">
                        <div class="card-title">
                            <i class="fa-solid fa-circle-arrow-down"></i> <span>Expense</span>
                        </div>
                        <p id="money-minus" class="money minus">-₹0.00</p>
                    </div>
                </div>
                <div class="transition">
                    <h3><i class="fa-solid fa-clock-rotate-left"></i> History</h3>
                    <ul id="list" class="list">
                    </ul>
                </div>
            </div>
            <div class="detail">
                <div class="form-info">
                    <h3><i class="fa-solid fa-file-invoice-dollar"></i> Add New Expense</h3>
                    <form id="form">
                        <!-- Description / Note -->
                        <div class="form-control">
                            <label for="text">Description</label>
                            <input type="text" id="text" placeholder="What was this for?" required/>
                        </div>

                        <!-- Amount -->
                        <div class="form-control">
                            <label for="amount">Amount (₹)</label>
                            <input type="number" id="amount" placeholder="Enter Amount..." required>
                        </div>

                        <!-- Type and Date -->
                         <div class="form-row">
                            <div class="form-control">
                                <label for="date">Date</label>
                                <input type="date" id="date" required>
                            </div>
                            <div class="form-control">
                                <label for="type">Type</label>
                                <select id="type">
                                    <option value="income">Income (+)</option>
                                    <option value="expense">Expense (-)</option>
                                </select>
                            </div>
                         </div>

                         <!-- Category -->
                          <div class="form-control">
                        <label for="category">Category</label>
                        <select id="category">
                            <option value="" disabled selected>Select Category...</option>
                            <option value="food">Food</option>
                            <option value="transport">Transport</option>
                            <option value="education">Education</option>
                            <option value="shopping">Shopping</option>
                            <option value="other">Other</option>
                        </select>
                    </div>

                    <button class="btn">Add Expense</button>
                    </form>
                </div>
            </div>
        </div>
    </div>


    <script src="script.js"></script>
</body>
</html>
